<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0B"/>
      <stop offset="100%" stop-color="#1A1410"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8C68C"/>
      <stop offset="100%" stop-color="#D99454"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern overlay -->
  <g opacity="0.04" stroke="#FFFFFF" stroke-width="1" fill="none">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Top eyebrow with brand mark -->
  <g transform="translate(72, 72)">
    <circle cx="6" cy="8" r="6" fill="#E8C68C"/>
    <text x="22" y="14" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13" font-weight="500" fill="#B7B2A7" letter-spacing="2.5">DIVYANSH SOOD · NEW DELHI</text>
  </g>

  <!-- Top-right meta -->
  <text x="1128" y="86" text-anchor="end" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" fill="#B7B2A7" letter-spacing="2">FOR INDIAN SMEs · SCHOOLS · CREATORS</text>

  <!-- Headline -->
  <text x="72" y="240" font-family="Inter Tight, system-ui, sans-serif" font-size="84" font-weight="600" fill="#F5F2EC" letter-spacing="-2">Your website,</text>
  <text x="72" y="332" font-family="Inter Tight, system-ui, sans-serif" font-size="84" font-weight="600" fill="#F5F2EC" letter-spacing="-2">
    <tspan font-family="Instrument Serif, serif" font-style="italic" fill="url(#accent)">live</tspan>
    <tspan fill="#F5F2EC"> in 14 days.</tspan>
  </text>

  <!-- Sub copy -->
  <text x="72" y="396" font-family="Inter Tight, system-ui, sans-serif" font-size="22" fill="#B7B2A7" letter-spacing="-0.2">
    <tspan>Custom-coded · ₹13,000 · GST invoice · 50% advance · Day-5 refund</tspan>
  </text>

  <!-- Price callout box -->
  <g transform="translate(72, 460)">
    <rect width="320" height="92" rx="8" fill="#16161A" stroke="#26262D" stroke-width="1"/>
    <text x="20" y="36" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#B7B2A7" letter-spacing="2.5">STARTS AT</text>
    <text x="20" y="74" font-family="Inter Tight, system-ui, sans-serif" font-size="38" font-weight="600" fill="#F5F2EC" letter-spacing="-1">₹13,000</text>
    <text x="180" y="74" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13" fill="url(#accent)" letter-spacing="1">+ 18% GST</text>
  </g>

  <!-- WhatsApp callout -->
  <g transform="translate(420, 460)">
    <rect width="380" height="92" rx="8" fill="#0e2a18" stroke="#1a4628" stroke-width="1"/>
    <circle cx="36" cy="46" r="20" fill="#25D366"/>
    <path d="M 36,33 a 13,13 0 1,0 0,26 a 13,13 0 1,0 0,-26 m -2,7 a 1.5,1.5 0 0,1 1.5,1.2 c 0.6,3 2.5,5.5 5,7 a 1.5,1.5 0 0,1 0.4,2.2 l -1,1.2 a 1,1 0 0,1 -1,0.4 c -3,-0.6 -5.5,-2.5 -7,-5 a 1,1 0 0,1 0.4,-1 l 1.2,-1 a 1.5,1.5 0 0,1 0.5,-1.5" fill="#0e2a18"/>
    <text x="68" y="40" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#7BC097" letter-spacing="2.5">WHATSAPP · 1H REPLY</text>
    <text x="68" y="68" font-family="Inter Tight, system-ui, sans-serif" font-size="24" font-weight="600" fill="#F5F2EC" letter-spacing="-0.5">+91-98160-91875</text>
  </g>

  <!-- Bottom strip with proof points -->
  <g transform="translate(72, 600)">
    <text font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#737373" letter-spacing="1.8">
      <tspan x="0" y="0">DIVYANSH.STUDIO  ·  6 LIVE CLIENTS  ·  14-DAY DELIVERY  ·  CUSTOM-CODED, NO TEMPLATES</tspan>
    </text>
  </g>

  <!-- Right edge accent line -->
  <rect x="1196" y="0" width="4" height="630" fill="url(#accent)"/>
</svg>
